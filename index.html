<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>社会用語クイズ</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="snd-correct" src="correct.mp3" preload="auto"></audio>
  <audio id="snd-incorrect" src="incorrect.mp3" preload="auto"></audio>

  <!-- パスワード画面 -->
  <div id="screen-password" class="screen">
    <div class="card">
      <h1>社会用語クイズ</h1>
      <p class="subtitle">パスワードを入力してください</p>
      <input type="password" id="password-input" class="text-input" placeholder="パスワード" autocomplete="off">
      <button id="btn-password" class="btn btn-primary">入室</button>
      <p id="password-error" class="error-msg hidden">パスワードが違います</p>
    </div>
  </div>

  <!-- トピック選択画面 -->
  <div id="screen-select" class="screen hidden">
    <div class="card">
      <h1>社会用語クイズ</h1>
      <p class="subtitle">単元を選んでください</p>
      <div id="topic-list"></div>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="screen hidden">
    <div class="card">
      <div id="quiz-header">
        <span id="quiz-topic-name"></span>
        <span id="quiz-progress"></span>
      </div>

      <div id="question-box">
        <p id="question-text"></p>
      </div>

      <div id="choices"></div>

      <div id="feedback" class="hidden">
        <p id="feedback-text"></p>
        <p id="feedback-answer"></p>
        <button id="btn-next" class="btn btn-primary">次の問題</button>
      </div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="screen hidden">
    <div class="card">
      <h2>結果発表</h2>
      <div id="result-stats">
        <div class="stat-box">
          <div class="stat-label">正解数</div>
          <div class="stat-value" id="result-correct"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">問題数</div>
          <div class="stat-value" id="result-total"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">正答率</div>
          <div class="stat-value" id="result-rate"></div>
        </div>
      </div>

      <div id="result-mistakes">
        <h3 id="mistakes-title"></h3>
        <ul id="mistakes-list"></ul>
      </div>

      <button id="btn-retry" class="btn btn-primary">もう一度</button>
      <button id="btn-back-select" class="btn btn-secondary">単元を選び直す</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
